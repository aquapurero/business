<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Payments | AquaPure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #000; color: #f5f5f7; font-family: sans-serif; }</style>
</head>
<body class="p-4 pb-12">
    <div class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-bold">Pending Payments</h1>
            <a href="admin.html" class="text-xs text-neutral-400 bg-neutral-900 px-3 py-1 rounded-lg">Back to Admin</a>
        </div>

        <div class="mb-6">
            <div class="flex justify-between text-xs mb-1">
                <span class="text-neutral-400">Total Volume Capacity</span>
                <span id="volume-text" class="text-white font-bold text-xs">0 / 168 Jars</span>
            </div>
            <div class="w-full bg-neutral-800 h-2 rounded-full overflow-hidden">
                <div id="volume-bar" class="bg-blue-600 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase tracking-widest">Daily Income</p>
                <p class="text-sm font-bold text-emerald-400" id="stat-daily-income">₹0</p>
            </div>
            <div class="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase tracking-widest">Monthly Income</p>
                <p class="text-sm font-bold text-emerald-400" id="stat-monthly-income">₹0</p>
            </div>
            <div class="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase tracking-widest">Daily Delivered</p>
                <p class="text-sm font-bold text-blue-400" id="stat-daily-delivered">0</p>
            </div>
            <div class="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase tracking-widest">Daily Empty Rec.</p>
                <p class="text-sm font-bold text-purple-400" id="stat-daily-received">0</p>
            </div>
        </div>
        
        <div id="pending-list" class="space-y-4">
            <div class="text-center text-neutral-500 py-10">Loading pending data...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqCuaCTnFwPCbkczZo4-Ysjjpq9qLX1iY",
            authDomain: "aquapure-1a3ce.firebaseapp.com",
            projectId: "aquapure-1a3ce",
            storageBucket: "aquapure-1a3ce.firebasestorage.app",
            messagingSenderId: "8661923251",
            appId: "1:8661923251:web:0cc44e9058a0d4859987c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const listContainer = document.getElementById('pending-list');
        const q = query(collection(db, "aquapure_orders"), where("status", "==", "progressing well"));

        onSnapshot(q, (snapshot) => {
            listContainer.innerHTML = '';
            let found = false;

            let dailyInc = 0, monthlyInc = 0, dailyDel = 0, dailyRec = 0;
            const now = new Date();
            const todayStr = now.toISOString().split('T')[0]; // YYYY-MM-DD
            const monthStr = now.toISOString().substring(0, 7); // YYYY-MM

            snapshot.forEach((docSnap) => {
                const data = docSnap.data();
                const orderDate = data.completedAt ? data.completedAt.split('T')[0] : "";
                const orderMonth = data.completedAt ? data.completedAt.substring(0, 7) : "";
                
                const paid = parseFloat(data.paidAmount) || 0;
                const del = parseInt(data.quantity) || 0;
                const rec = parseInt(data.emptyJarsReceived) || 0;

                // Analytics Logic
                if (orderMonth === monthStr) monthlyInc += paid;
                if (orderDate === todayStr) {
                    dailyInc += paid;
                    dailyDel += del;
                    dailyRec += rec;
                }

                if (data.pendingAmount > 0) {
                    found = true;
                    const card = document.createElement('div');
                    card.className = "bg-neutral-900 border border-neutral-800 p-4 rounded-2xl";
                    card.innerHTML = `
                        <div class="flex justify-between mb-3">
                            <span class="font-bold text-white">${data.customerName}</span>
                            <span class="text-[10px] bg-amber-500/10 text-amber-500 px-2 py-0.5 rounded">Credit</span>
                        </div>
                        <div class="text-xs text-neutral-400 space-y-1.5 border-b border-neutral-800 pb-3 mb-3">
                            <p><i class="fa-solid fa-box mr-2"></i> ${data.quantity} Jars | Empty: ${data.emptyJarsReceived || 0}</p>
                            <p><i class="fa-solid fa-phone mr-2"></i> ${data.mobileNumber || 'N/A'}</p>
                            <p><i class="fa-solid fa-calendar mr-2"></i> ${data.completedAt?.split('T')[0] || 'N/A'}</p>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-bold text-amber-400">Due: ₹${data.pendingAmount}</span>
                            <button onclick="window.markAsPaid('${docSnap.id}', ${data.pendingAmount})" class="bg-emerald-600 text-white text-xs font-bold px-4 py-2 rounded-xl">
                                Mark as Paid
                            </button>
                        </div>
                    `;
                    listContainer.appendChild(card);
                }
            });

            // Update UI
            document.getElementById('stat-daily-income').innerText = `₹${dailyInc}`;
            document.getElementById('stat-monthly-income').innerText = `₹${monthlyInc}`;
            document.getElementById('stat-daily-delivered').innerText = dailyDel;
            document.getElementById('stat-daily-received').innerText = dailyRec;
            
            const percent = Math.min((dailyDel / 168) * 100, 100);
            document.getElementById('volume-bar').style.width = percent + "%";
            document.getElementById('volume-text').innerText = `${dailyDel} / 168 Jars`;

            if (!found) {
                listContainer.innerHTML = '<div class="text-center text-neutral-500 py-10">No pending payments! 🎉</div>';
            }
        });

        window.markAsPaid = async (id, amount) => {
            if(confirm("Confirm: Payment received for this order?")) {
                try {
                    await updateDoc(doc(db, "aquapure_orders", id), {
                        paymentStatus: 'Paid',
                        paidAmount: amount,
                        pendingAmount: 0
                    });
                    alert("Payment updated successfully!");
                } catch (e) {
                    alert("Error updating payment.");
                }
            }
        };
    </script>
</body>
</html>
