<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pending Payments | AquaPure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>body { background-color: #000; color: #f5f5f7; font-family: sans-serif; }</style>
</head>
<body class="p-4 pb-12">
    <div class="max-w-md mx-auto">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-xl font-bold">Pending Payments</h1>
            <a href="admin.html" class="text-xs text-neutral-400 bg-neutral-900 px-3 py-1 rounded-lg">Back to Admin</a>
        </div>

        <div class="mb-6">
            <div class="flex justify-between text-xs mb-1">
                <span class="text-neutral-400">Total Volume Capacity</span>
                <span id="volume-text" class="text-white font-bold text-xs">0 / 168 Jars</span>
            </div>
            <div class="w-full bg-neutral-800 h-2 rounded-full overflow-hidden">
                <div id="volume-bar" class="bg-blue-600 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase tracking-widest">Daily Income</p>
                <p class="text-sm font-bold text-emerald-400" id="stat-daily-income">₹0</p>
            </div>
            <div class="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase tracking-widest">Monthly Income</p>
                <p class="text-sm font-bold text-emerald-400" id="stat-monthly-income">₹0</p>
            </div>
            <div class="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase tracking-widest">Daily Expense</p>
                <p class="text-sm font-bold text-rose-400" id="stat-daily-expense">₹0</p>
            </div>
            <div class="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase tracking-widest">Monthly Expense</p>
                <p class="text-sm font-bold text-rose-400" id="stat-monthly-expense">₹0</p>
            </div>
            <div class="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase tracking-widest">Daily Delivered</p>
                <p class="text-sm font-bold text-blue-400" id="stat-daily-delivered">0</p>
            </div>
            <div class="bg-neutral-900 p-3 rounded-xl border border-neutral-800">
                <p class="text-[9px] text-neutral-500 uppercase tracking-widest">Daily Empty Rec.</p>
                <p class="text-sm font-bold text-purple-400" id="stat-daily-received">0</p>
            </div>
        </div>
        
        <div id="pending-list" class="space-y-4">
            <div class="text-center text-neutral-500 py-10">Loading pending data...</div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const db = getFirestore(initializeApp({
            apiKey: "AIzaSyAqCuaCTnFwPCbkczZo4-Ysjjpq9qLX1iY",
            authDomain: "aquapure-1a3ce.firebaseapp.com",
            projectId: "aquapure-1a3ce",
            storageBucket: "aquapure-1a3ce.firebasestorage.app",
            messagingSenderId: "8661923251",
            appId: "1:8661923251:web:0cc44e9058a0d4859987c6"
        }));

        // 1. Order Listener (Income & Delivery)
        onSnapshot(query(collection(db, "aquapure_orders"), where("status", "==", "progressing well")), (snap) => {
            const list = document.getElementById('pending-list');
            list.innerHTML = '';
            let dInc = 0, mInc = 0, dDel = 0, dRec = 0;
            const today = new Date().toISOString().split('T')[0];
            const month = new Date().toISOString().substring(0, 7);

            snap.forEach(docSnap => {
                const d = docSnap.data();
                if (d.completedAt?.startsWith(month)) mInc += (parseFloat(d.paidAmount) || 0);
                if (d.completedAt?.startsWith(today)) {
                    dInc += (parseFloat(d.paidAmount) || 0);
                    dDel += parseInt(d.quantity) || 0;
                    dRec += parseInt(d.emptyJarsReceived) || 0;
                }
                if (d.pendingAmount > 0) {
                    list.innerHTML += `<div class="bg-neutral-900 border border-neutral-800 p-4 rounded-2xl">
                        <div class="flex justify-between mb-3">
                            <span class="font-bold text-white">${d.customerName}</span>
                            <span class="text-[10px] bg-amber-500/10 text-amber-500 px-2 py-0.5 rounded">Credit</span>
                        </div>
                        <div class="text-xs text-neutral-400 space-y-1.5 border-b border-neutral-800 pb-3 mb-3">
                            <p><i class="fa-solid fa-box mr-2"></i> ${d.quantity} Jars | Empty: ${d.emptyJarsReceived || 0}</p>
                            <p><i class="fa-solid fa-phone mr-2"></i> ${d.mobileNumber || 'N/A'}</p>
                            <p><i class="fa-solid fa-calendar mr-2"></i> ${d.completedAt?.split('T')[0] || 'N/A'}</p>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm font-bold text-amber-400">Due: ₹${d.pendingAmount}</span>
                            <button onclick="window.markAsPaid('${docSnap.id}', ${d.pendingAmount})" class="bg-emerald-600 text-white text-xs font-bold px-4 py-2 rounded-xl">Mark as Paid</button>
                        </div>
                    </div>`;
                }
            });
            document.getElementById('stat-daily-income').innerText = `₹${dInc}`;
            document.getElementById('stat-monthly-income').innerText = `₹${mInc}`;
            document.getElementById('stat-daily-delivered').innerText = dDel;
            document.getElementById('stat-daily-received').innerText = dRec;
            document.getElementById('volume-bar').style.width = Math.min((dDel / 168) * 100, 100) + "%";
            document.getElementById('volume-text').innerText = `${dDel} / 168 Jars`;
        });

        // 2. Expense Listener
        onSnapshot(collection(db, "expenses"), (snap) => {
            let dExp = 0, mExp = 0;
            const today = new Date().toISOString().split('T')[0];
            const month = new Date().toISOString().substring(0, 7);
            snap.forEach(doc => {
                const d = doc.data();
                if(!d.timestamp) return;
                const dt = d.timestamp.toDate().toISOString().split('T')[0];
                const mon = d.timestamp.toDate().toISOString().substring(0, 7);
                if(dt === today) dExp += d.amount;
                if(mon === month) mExp += d.amount;
            });
            document.getElementById('stat-daily-expense').innerText = `₹${dExp}`;
            document.getElementById('stat-monthly-expense').innerText = `₹${mExp}`;
        });

        window.markAsPaid = async (id, amount) => {
            if(confirm("Confirm: Payment received?")) {
                await updateDoc(doc(db, "aquapure_orders", id), { paymentStatus: 'Paid', paidAmount: amount, pendingAmount: 0 });
            }
        };
    </script>
</body>
</html>
