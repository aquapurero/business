<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaPure - Core Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(circle at top, #0f172a, #000000);
            color: #f5f5f7;
        }
        .apple-blur {
            background: rgba(22, 22, 23, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .gradient-btn {
            background: linear-gradient(135deg, #00c6ff 0%, #0072ff 100%);
            transition: all 0.3s ease;
        }
        .gradient-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 114, 255, 0.3);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-md apple-blur rounded-3xl p-8 space-y-6 shadow-2xl relative overflow-hidden">
        <div class="text-center space-y-2">
            <div class="h-12 w-12 rounded-2xl bg-gradient-to-tr from-cyan-400 to-blue-600 flex items-center justify-center shadow-lg mx-auto">
                <i class="fa-solid fa-droplet text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-white mt-4">AquaPure Terminal</h1>
            <p class="text-sm text-neutral-400">Access your water supply operations engine</p>
        </div>

        <div class="flex bg-neutral-900/60 p-1 rounded-xl border border-neutral-800">
            <button id="tab-signin" onclick="switchAuthMode('signin')" class="w-1/2 text-sm font-medium py-2 rounded-lg text-white bg-neutral-800 shadow-sm transition-all">Sign In</button>
            <button id="tab-signup" onclick="switchAuthMode('signup')" class="w-1/2 text-sm font-medium py-2 rounded-lg text-neutral-400 transition-all">Sign Up</button>
        </div>

        <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
            
            <div id="avatar-container" class="hidden flex flex-col items-center justify-center space-y-2 pb-2">
                <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400">Profile Picture</label>
                <div class="relative group cursor-pointer">
                    <input type="file" id="avatar-input" accept="image/*" class="hidden" onchange="previewAndCompressAvatar(event)">
                    <div onclick="document.getElementById('avatar-input').click()" class="h-24 w-24 rounded-full border-2 border-dashed border-neutral-700 bg-neutral-900/50 flex items-center justify-center overflow-hidden hover:border-blue-500 transition-all relative">
                        <img id="avatar-preview" src="" class="hidden h-full w-full object-cover">
                        <div id="avatar-placeholder" class="text-center flex flex-col items-center justify-center text-neutral-500 group-hover:text-neutral-300">
                            <i class="fa-solid fa-camera text-xl mb-1"></i>
                            <span class="text-[10px]">Upload</span>
                        </div>
                    </div>
                </div>
                <p id="compress-status" class="text-[11px] text-emerald-400 hidden"><i class="fa-solid fa-circle-check"></i> Image Compressed Successfully</p>
            </div>

            <div id="fullname-container" class="hidden">
                <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-1.5">Display Name (Rider App Name)</label>
                <div class="relative">
                    <i class="fa-solid fa-id-card absolute left-4 top-3.5 text-neutral-500 text-sm"></i>
                    <input type="text" id="fullname" class="w-full bg-neutral-900/50 border border-neutral-800 rounded-xl pl-11 pr-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="e.g., Abinash Kumar">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-1.5">Mobile Number (Login ID)</label>
                <div class="relative">
                    <i class="fa-solid fa-phone absolute left-4 top-3.5 text-neutral-500 text-sm"></i>
                    <input type="tel" id="mobileNumber" pattern="[0-9]{10}" required class="w-full bg-neutral-900/50 border border-neutral-800 rounded-xl pl-11 pr-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="10-digit mobile number">
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-1.5">Password</label>
                <div class="relative">
                    <i class="fa-solid fa-lock absolute left-4 top-3.5 text-neutral-500 text-sm"></i>
                    <input type="password" id="password" required class="w-full bg-neutral-900/50 border border-neutral-800 rounded-xl pl-11 pr-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors" placeholder="••••••••">
                </div>
            </div>

            <div id="role-container" class="hidden">
                <label class="block text-xs font-medium uppercase tracking-wider text-neutral-400 mb-1.5">Account Profile Role</label>
                <select id="role" class="w-full bg-neutral-900/50 border border-neutral-800 rounded-xl px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors">
                    <option value="Staff">Staff / Delivery Rider</option>
                    <option value="Admin">System Administrator</option>
                </select>
            </div>

            <button type="submit" id="submit-btn" class="w-full gradient-btn text-white font-medium py-3.5 rounded-xl mt-2 shadow-lg">
                Authenticate Session
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqCuaCTnFwPCbkczZo4-Ysjjpq9qLX1iY",
            authDomain: "aquapure-1a3ce.firebaseapp.com",
            projectId: "aquapure-1a3ce",
            storageBucket: "aquapure-1a3ce.firebasestorage.app",
            messagingSenderId: "8661923251",
            appId: "1:8661923251:web:0cc44e9058a0d4859987c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let mode = 'signin';
        let compressedAvatarBase64 = ""; 

        window.switchAuthMode = function(targetMode) {
            mode = targetMode;
            const btnSignin = document.getElementById('tab-signin');
            const btnSignup = document.getElementById('tab-signup');
            const roleContainer = document.getElementById('role-container');
            const avatarContainer = document.getElementById('avatar-container');
            const fullnameContainer = document.getElementById('fullname-container');
            const submitBtn = document.getElementById('submit-btn');
            const fullnameInput = document.getElementById('fullname');
            const mobileInput = document.getElementById('mobileNumber');

            compressedAvatarBase64 = "";
            document.getElementById('avatar-preview').classList.add('hidden');
            document.getElementById('avatar-placeholder').classList.remove('hidden');
            document.getElementById('compress-status').classList.add('hidden');
            document.getElementById('avatar-input').value = "";
            fullnameInput.value = "";
            mobileInput.value = "";

            if (mode === 'signup') {
                btnSignup.className = "w-1/2 text-sm font-medium py-2 rounded-lg text-white bg-neutral-800 shadow-sm transition-all";
                btnSignin.className = "w-1/2 text-sm font-medium py-2 rounded-lg text-neutral-400 transition-all";
                roleContainer.classList.remove('hidden');
                avatarContainer.classList.remove('hidden');
                fullnameContainer.classList.remove('hidden');
                fullnameInput.required = true;
                submitBtn.innerText = "Register System Account";
            } else {
                btnSignin.className = "w-1/2 text-sm font-medium py-2 rounded-lg text-white bg-neutral-800 shadow-sm transition-all";
                btnSignup.className = "w-1/2 text-sm font-medium py-2 rounded-lg text-neutral-400 transition-all";
                roleContainer.classList.add('hidden');
                avatarContainer.classList.add('hidden');
                fullnameContainer.classList.add('hidden');
                fullnameInput.required = false;
                submitBtn.innerText = "Authenticate Session";
            }
        }

        window.previewAndCompressAvatar = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = function(event) {
                const img = new Image();
                img.src = event.target.result;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const maxSize = 300; 
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > maxSize) {
                            height *= maxSize / width;
                            width = maxSize;
                        }
                    } else {
                        if (height > maxSize) {
                            width *= maxSize / height;
                            height = maxSize;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    ctx.drawImage(img, 0, 0, width, height);

                    compressedAvatarBase64 = canvas.toDataURL('image/jpeg', 0.7);

                    const preview = document.getElementById('avatar-preview');
                    const placeholder = document.getElementById('avatar-placeholder');
                    const status = document.getElementById('compress-status');

                    preview.src = compressedAvatarBase64;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                    status.classList.remove('hidden');
                }
            }
        }

        window.handleAuth = async function(e) {
            e.preventDefault();
            const mobileInput = document.getElementById('mobileNumber').value.trim();
            const passwordInput = document.getElementById('password').value;
            const roleInput = document.getElementById('role').value;
            const rawFullName = document.getElementById('fullname').value.trim();

            if (!mobileInput || !passwordInput) return;

            // Database reference is now configured using Mobile Number as the Document ID key
            const userDocRef = doc(db, "aquapure_users", mobileInput);

            if (mode === 'signup') {
                const snap = await getDoc(userDocRef);
                if(snap.exists()){
                    alert("This mobile number is already registered!");
                    return;
                }
                
                // Saving registration details
                await setDoc(userDocRef, {
                    mobile: mobileInput,
                    displayName: rawFullName || ("User_" + mobileInput.substring(6)),
                    password: passwordInput, 
                    role: roleInput,
                    avatar: compressedAvatarBase64 || null
                });

                if (roleInput === 'Staff') {
                    const riderDocRef = doc(db, "riders", mobileInput);
                    await setDoc(riderDocRef, {
                        displayName: rawFullName,
                        password: passwordInput,
                        walletBalance: 0
                    });
                }

                alert("Account successfully provisioned! Please sign in.");
                switchAuthMode('signin');
            } else {
                // Sign In Process using Mobile Number
                const snap = await getDoc(userDocRef);
                if(!snap.exists()) {
                    alert("User terminal profile with this mobile number not found.");
                    return;
                }
                const userData = snap.data();
                if(userData.password === passwordInput) {
                    localStorage.setItem('active_user', userData.mobile);
                    
                    // Storing the exact Display Name typed by the user to use in staff.html
                    if (userData.displayName) {
                        localStorage.setItem('active_user_name', userData.displayName);
                    } else {
                        localStorage.setItem('active_user_name', userData.mobile);
                    }

                    if (userData.avatar) {
                        localStorage.setItem('active_user_avatar', userData.avatar);
                    } else {
                        localStorage.removeItem('active_user_avatar');
                    }

                    if(userData.role === 'Admin') {
                        window.location.href = 'admin.html';
                    } else {
                        window.location.href = 'staff.html';
                    }
                } else {
                    alert("Invalid security password credentials matrix.");
                }
            }
        }
    </script>
</body>
</html>
