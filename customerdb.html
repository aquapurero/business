<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaPure Terminal | Customer Database</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #f5f5f7;
            -webkit-tap-highlight-color: transparent;
        }
        .apple-blur {
            background: rgba(22, 22, 23, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .gradient-btn {
            background: linear-gradient(135deg, #2563eb 0%, #4f46e5 100%);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .gradient-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(59, 130, 246, 0.3);
        }
        .gradient-btn:active {
            transform: translateY(1px);
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #27272a;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #3f3f46;
        }
    </style>
</head>
<body class="min-h-screen pb-24 md:pb-12 custom-scrollbar">

    <nav class="sticky top-0 z-50 apple-blur border-b border-neutral-900 px-4 md:px-6 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-droplet text-white text-lg"></i>
            </div>
            <div>
                <span class="text-base font-semibold tracking-tight text-white block leading-tight">AquaPure Live</span>
                <span class="text-[9px] text-neutral-400 font-mono uppercase tracking-widest block">Customer Core Node</span>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <a href="index.html" class="flex items-center space-x-1.5 bg-neutral-900 hover:bg-neutral-800 border border-neutral-800 px-3 py-2 rounded-xl transition-all text-neutral-300 hover:text-white text-xs font-medium">
                <i class="fa-solid fa-chart-line text-blue-400"></i>
                <span class="hidden sm:inline">Dashboard</span>
            </a>
            <div class="flex items-center space-x-1.5">
                <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                <span class="text-[10px] font-mono text-neutral-400 uppercase tracking-wider hidden md:inline-block">Live</span>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1">
            <div class="apple-blur rounded-2xl p-5 md:p-6 shadow-xl sticky top-24">
                <div class="flex items-center space-x-2.5 mb-5">
                    <i class="fa-solid fa-user-plus text-blue-400 text-lg"></i>
                    <h2 class="text-lg font-bold text-white tracking-tight">Add New Customer</h2>
                </div>
                
                <form id="customerForm" class="space-y-4" autocomplete="off">
                    <div>
                        <label class="block text-[10px] font-semibold text-neutral-400 uppercase tracking-wider">Customer Name</label>
                        <input type="text" id="name" required class="mt-1.5 block w-full bg-neutral-900/60 border border-neutral-800 rounded-xl p-3 text-white focus:outline-none focus:border-blue-500/80 text-sm transition-all placeholder:text-neutral-600" placeholder="Rahul Kumar">
                    </div>
                    
                    <div>
                        <label class="block text-[10px] font-semibold text-neutral-400 uppercase tracking-wider">Phone Number</label>
                        <input type="tel" id="phone" required pattern="[0-9]{10}" class="mt-1.5 block w-full bg-neutral-900/60 border border-neutral-800 rounded-xl p-3 text-white focus:outline-none focus:border-blue-500/80 text-sm font-mono transition-all placeholder:text-neutral-600" placeholder="9876543210">
                    </div>
                    
                    <div>
                        <label class="block text-[10px] font-semibold text-neutral-400 uppercase tracking-wider">Complete Address</label>
                        <textarea id="address" rows="2" required class="mt-1.5 block w-full bg-neutral-900/60 border border-neutral-800 rounded-xl p-3 text-white focus:outline-none focus:border-blue-500/80 text-sm transition-all resize-none placeholder:text-neutral-600" placeholder="Enter residential or business address..."></textarea>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-semibold text-neutral-400 uppercase tracking-wider">Default Qty</label>
                            <input type="number" id="defaultQty" value="1" min="1" required class="mt-1.5 block w-full bg-neutral-900/60 border border-neutral-800 rounded-xl p-3 text-white focus:outline-none focus:border-blue-500/80 text-sm font-mono transition-all">
                        </div>
                        <div>
                            <label class="block text-[10px] font-semibold text-neutral-400 uppercase tracking-wider">Jar Price (INR)</label>
                            <input type="number" id="price" required class="mt-1.5 block w-full bg-neutral-900/60 border border-neutral-800 rounded-xl p-3 text-white focus:outline-none focus:border-blue-500/80 text-sm font-mono transition-all placeholder:text-neutral-600" placeholder="30">
                        </div>
                    </div>
                    
                    <button type="submit" class="w-full gradient-btn text-white font-semibold py-3.5 px-4 rounded-xl shadow-lg shadow-blue-500/10 transition-all text-sm flex items-center justify-center space-x-2 mt-2">
                        <i class="fa-solid fa-cloud-arrow-up text-xs"></i>
                        <span>Save Customer Document</span>
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-4">
            
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 px-1">
                <div>
                    <h1 class="text-xl font-bold text-white tracking-tight">Customer Database Matrix</h1>
                    <p class="text-xs text-neutral-400 mt-0.5">Real-time repository for centralized client nodes</p>
                </div>
                
                <div class="flex gap-2 w-full sm:w-auto">
                    <button id="bulkSendBtn" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl text-xs font-bold transition-all flex items-center gap-2 shrink-0">
                        <i class="fa-solid fa-bolt"></i> Bulk Send
                    </button>
                    <div class="relative w-full sm:w-64">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-neutral-500">
                            <i class="fa-solid fa-magnifying-glass text-xs"></i>
                        </span>
                        <input type="text" id="searchBar" class="block w-full bg-neutral-900/60 border border-neutral-800 rounded-xl pl-9 pr-4 py-2.5 text-white focus:outline-none focus:border-blue-500/80 text-xs transition-all placeholder:text-neutral-500" placeholder="Search...">
                    </div>
                </div>
            </div>

            <div id="matrixContainer" class="space-y-3.5">
                <div class="apple-blur rounded-2xl p-8 text-center text-neutral-500 flex flex-col items-center justify-center space-y-3">
                    <i class="fa-solid fa-circle-notch animate-spin text-blue-500 text-xl"></i>
                    <p class="text-sm font-medium tracking-wide">Synchronizing live database records stream...</p>
                </div>
            </div>
            
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            onSnapshot, 
            query, 
            orderBy, 
            doc, 
            updateDoc, 
            deleteDoc, 
            serverTimestamp,
            where,
            getDocs 
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqCuaCTnFwPCbkczZo4-Ysjjpq9qLX1iY",
            authDomain: "aquapure-1a3ce.firebaseapp.com",
            projectId: "aquapure-1a3ce",
            storageBucket: "aquapure-1a3ce.firebasestorage.app",
            messagingSenderId: "8661923251",
            appId: "1:8661923251:web:0cc44e9058a0d4859987c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const customerForm = document.getElementById('customerForm');
        const matrixContainer = document.getElementById('matrixContainer');
        const searchBar = document.getElementById('searchBar');
        const bulkSendBtn = document.getElementById('bulkSendBtn');

        // Bulk Send Logic
        bulkSendBtn.onclick = async () => {
            const rider = prompt("Enter Rider Name for assignment:");
            if (!rider) return;
            if(!confirm(`Assign all 'Regular' customers to ${rider}?`)) return;

            try {
                const q = query(collection(db, "customers"), where("deliveryType", "==", "Regular"));
                const querySnapshot = await getDocs(q);
                
                const promises = querySnapshot.docs.map(item => {
                    const data = item.data();
                    return addDoc(collection(db, "aquapure_orders"), {
                        customerName: data.name,
                        phone: data.phone,
                        address: data.address,
                        quantity: data.defaultQty,
                        rider: rider,
                        status: "Pending",
                        timestamp: serverTimestamp()
                    });
                });
                await Promise.all(promises);
                alert("Bulk dispatch successful!");
            } catch (err) {
                console.error(err);
                alert("Bulk dispatch failed.");
            }
        };

        customerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const address = document.getElementById('address').value.trim();
            const price = document.getElementById('price').value;
            const defaultQty = document.getElementById('defaultQty').value;

            try {
                await addDoc(collection(db, "customers"), {
                    name, phone, address, 
                    price: parseFloat(price),
                    defaultQty: parseInt(defaultQty) || 1,
                    deliveryType: "Regular",
                    createdAt: serverTimestamp()
                });
                alert("Customer Profile safely archived!");
                customerForm.reset();
            } catch (error) {
                alert("Writing to Cloud Failed.");
            }
        });

        const q = query(collection(db, "customers"), orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            matrixContainer.innerHTML = "";
            snapshot.forEach((snapshotDoc) => {
                const data = snapshotDoc.data();
                const id = snapshotDoc.id;
                const dQty = data.defaultQty || 1;
                const dType = data.deliveryType || "Regular";

                const typeBadge = dType === "Regular" 
                    ? `<span class="inline-flex items-center text-[10px] font-mono font-bold uppercase tracking-wider px-2 py-0.5 rounded-md bg-blue-500/10 border border-blue-500/20 text-blue-400 type-field">Regular</span>`
                    : `<span class="inline-flex items-center text-[10px] font-mono font-bold uppercase tracking-wider px-2 py-0.5 rounded-md bg-amber-500/10 border border-amber-500/20 text-amber-400 type-field">Inregular</span>`;

                const nodeCard = document.createElement('div');
                nodeCard.className = "apple-blur rounded-2xl p-4 md:p-5 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 hover:border-neutral-700/60 transition-all duration-200 customer-row";
                
                nodeCard.innerHTML = `
                    <div class="space-y-1 w-full sm:w-auto">
                        <div class="flex items-center justify-between sm:justify-start gap-2.5">
                            <span class="font-bold text-white text-base tracking-tight name-field">${data.name}</span>
                            ${typeBadge}
                        </div>
                        <div class="text-xs font-mono text-neutral-400 flex items-center gap-1.5 phone-field">
                            <i class="fa-solid fa-phone text-[10px] text-neutral-500"></i>${data.phone}
                        </div>
                        <div class="text-xs text-neutral-400 flex items-start gap-1.5 pt-0.5 max-w-sm">
                            <i class="fa-solid fa-location-dot text-[11px] text-neutral-500 mt-0.5 shrink-0"></i>
                            <span class="line-clamp-2">${data.address}</span>
                        </div>
                    </div>
                    <div class="flex items-center justify-between sm:justify-end gap-4 w-full sm:w-auto border-t sm:border-t-0 border-neutral-900 pt-3 sm:pt-0">
                        <div class="flex items-center space-x-2.5">
                            <div class="flex flex-col items-center">
                                <span class="text-[9px] font-mono uppercase tracking-widest text-neutral-500 block mb-1">Qty</span>
                                <input type="number" value="${dQty}" id="qty-${id}" class="w-12 bg-neutral-950 border border-neutral-800 rounded-lg py-1 text-xs text-center font-mono text-neutral-200 focus:outline-none focus:border-neutral-700">
                            </div>
                            <div class="flex flex-col items-center">
                                <span class="text-[9px] font-mono uppercase tracking-widest text-neutral-500 block mb-1">Rate (₹)</span>
                                <input type="number" value="${data.price}" id="price-${id}" class="w-16 bg-neutral-950 border border-neutral-800 rounded-lg py-1 text-xs text-center font-mono text-emerald-400 font-bold focus:outline-none focus:border-blue-500">
                            </div>
                        </div>
                        <div class="flex items-center space-x-2 self-end sm:self-center">
                            <button onclick="saveInlineEdits('${id}')" class="h-9 w-9 bg-blue-500/10 hover:bg-blue-600 border border-blue-500/20 text-blue-400 hover:text-white rounded-xl flex items-center justify-center transition-all">
                                <i class="fa-solid fa-rotate text-xs"></i>
                            </button>
                            <button onclick="switchTypeProfile('${id}')" class="h-9 w-9 bg-neutral-900 hover:bg-neutral-800 border border-neutral-800 text-neutral-300 rounded-xl flex items-center justify-center transition-all">
                                <i class="fa-solid fa-arrows-left-right text-xs"></i>
                            </button>
                            <button onclick="purgeDocumentNode('${id}')" class="h-9 w-9 bg-rose-500/10 hover:bg-rose-500 border border-rose-500/20 text-rose-400 hover:text-white rounded-xl flex items-center justify-center transition-all">
                                <i class="fa-solid fa-trash-can text-xs"></i>
                            </button>
                        </div>
                    </div>
                `;
                matrixContainer.appendChild(nodeCard);
            });
        });

        window.saveInlineEdits = async (id) => {
            const updatedPrice = document.getElementById(`price-${id}`).value;
            const updatedQty = document.getElementById(`qty-${id}`).value;
            await updateDoc(doc(db, "customers", id), { price: parseFloat(updatedPrice), defaultQty: parseInt(updatedQty) || 1 });
            alert("Updated!");
        };

        window.switchTypeProfile = async (id) => {
            const docRef = doc(db, "customers", id);
            const card = document.querySelector(`button[onclick="switchTypeProfile('${id}')"]`).closest('.customer-row');
            const current = card.querySelector('.type-field').textContent.trim();
            await updateDoc(docRef, { deliveryType: current === "Regular" ? "Inregular" : "Regular" });
        };

        window.purgeDocumentNode = async (id) => {
            if(confirm("Delete this profile?")) await deleteDoc(doc(db, "customers", id));
        };

        searchBar.onkeyup = function() {
            const val = searchBar.value.toLowerCase();
            document.querySelectorAll('.customer-row').forEach(row => {
                row.style.display = (row.textContent.toLowerCase().includes(val)) ? "flex" : "none";
            });
        };
    </script>
</body>
</html>
