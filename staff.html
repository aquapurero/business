<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaPure Terminal | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #000000;
            color: #f5f5f7;
        }
        .apple-blur {
            background: rgba(22, 22, 23, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .status-pipeline::before {
            content: '';
            position: absolute;
            left: 23px;
            top: 24px;
            bottom: 24px;
            width: 2px;
            background: #27272a;
            z-index: 0;
        }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="sticky top-0 z-50 apple-blur border-b border-neutral-900 px-4 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-droplet text-white text-lg"></i>
            </div>
            <div class="flex items-center space-x-3">
                <img id="nav-avatar" src="" class="h-9 w-9 rounded-full object-cover border border-neutral-800 hidden">
                <div>
                    <span class="text-lg font-semibold tracking-tight text-white block">AquaPure Live</span>
                    <span class="text-[10px] text-neutral-400 font-mono uppercase tracking-widest block" id="rider-mobile-identity">Connecting...</span>
                </div>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <div id="dutyStatusContainer">
                <button onclick="window.triggerPunchIn()" id="punchBtn" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-xs text-white font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-emerald-500/20 transition-all flex items-center space-x-1.5">
                    <i class="fa-solid fa-right-to-bracket"></i>
                    <span>Punch In</span>
                </button>
            </div>
            <button onclick="window.processLogout()" class="h-9 w-9 rounded-xl bg-neutral-900 border border-neutral-800 flex items-center justify-center text-neutral-400 hover:text-rose-400 transition-colors">
                <i class="fa-solid fa-power-off text-sm"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        
        <div class="grid grid-cols-2 gap-4">
            <div class="apple-blur rounded-2xl p-4 flex items-center justify-between">
                <div>
                    <span class="text-[11px] text-neutral-400 font-medium uppercase tracking-wider block">Today's Earnings</span>
                    <span class="text-xl font-bold text-white mt-1 block font-mono" id="rider-earnings">₹0.00</span>
                </div>
                <div class="h-9 w-9 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400">
                    <i class="fa-solid fa-wallet text-sm"></i>
                </div>
            </div>
            <div class="apple-blur rounded-2xl p-4 flex items-center justify-between">
                <div>
                    <span class="text-[11px] text-neutral-400 font-medium uppercase tracking-wider block">Jars Dispatched</span>
                    <span class="text-xl font-bold text-white mt-1 block font-mono" id="rider-jars">0</span>
                </div>
                <div class="h-9 w-9 rounded-xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center text-blue-400">
                    <i class="fa-solid fa-box text-sm"></i>
                </div>
            </div>
        </div>

        <div class="flex justify-between items-center px-1">
            <div>
                <h2 class="text-lg font-bold tracking-tight text-white">Your Delivery Pipeline</h2>
                <p class="text-xs text-neutral-400 mt-0.5">Real-time job queue updates automatically</p>
            </div>
            <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
        </div>

        <div class="relative status-pipeline space-y-6" id="pipeline-stream-stack">
            <div class="apple-blur rounded-2xl p-6 text-center text-neutral-500 text-sm">
                <i class="fa-solid fa-circle-notch animate-spin text-blue-500 text-lg mb-2 block"></i>
                Synchronizing live cloud stream node...
            </div>
        </div>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, setDoc, updateDoc, increment, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqCuaCTnFwPCbkczZo4-Ysjjpq9qLX1iY",
            authDomain: "aquapure-1a3ce.firebaseapp.com",
            projectId: "aquapure-1a3ce",
            storageBucket: "aquapure-1a3ce.firebasestorage.app",
            messagingSenderId: "8661923251",
            appId: "1:8661923251:web:0cc44e9058a0d4859987c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const riderMobileId = localStorage.getItem('active_user');
        const riderDisplayName = localStorage.getItem('active_user_name') || 'Rider';
        const storedAvatar = localStorage.getItem('active_user_avatar');

        if (!riderMobileId) {
            window.location.href = "index.html";
        }

        document.getElementById('rider-mobile-identity').innerText = `Node: ${riderMobileId} (${riderDisplayName})`;
        
        if (storedAvatar) {
            const navAvatar = document.getElementById('nav-avatar');
            navAvatar.src = storedAvatar;
            navAvatar.classList.remove('hidden');
        }

        const ordersRef = collection(db, "aquapure_orders");
        const customersRef = collection(db, "customers");
        
        const DEFAULT_COMM_RATE = 3; 
        const DEFAULT_JAR_PRICE = 30; // Default price agar customerdb me set na ho
        let isPunchedInToday = false; 
        let globalCustomersMap = new Map();

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        const todayStr = getTodayString();
        const docSlug = `${riderMobileId}_${todayStr}`;
        const attDocRef = doc(db, "rider_attendance", docSlug);

        // Fetch all customers data live to get customized prices
        onSnapshot(customersRef, (snapshot) => {
            globalCustomersMap.clear();
            snapshot.forEach((doc) => {
                const data = doc.data();
                if (data.name) {
                    globalCustomersMap.set(data.name.trim().toLowerCase(), {
                        jarPrice: parseFloat(data.price) || parseFloat(data.jarPrice) || DEFAULT_JAR_PRICE,
                        commRate: parseFloat(data.commission) || DEFAULT_COMM_RATE
                    });
                }
            });
            // Trigger stream update whenever customer DB changes
            triggerPipelineStream();
        });

        // Attendance Real-time Tracker
        onSnapshot(attDocRef, (docSnap) => {
            const container = document.getElementById('dutyStatusContainer');
            if(!container) return;

            if(!docSnap.exists()) {
                isPunchedInToday = false;
                container.innerHTML = `
                    <button onclick="window.triggerPunchIn()" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-xs text-white font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-emerald-500/20 transition-all flex items-center space-x-1.5 animate-pulse">
                        <i class="fa-solid fa-right-to-bracket"></i>
                        <span>Punch In</span>
                    </button>
                `;
            } else {
                const data = docSnap.data();
                if (data.punchIn && !data.punchOut) {
                    isPunchedInToday = true;
                    container.innerHTML = `
                        <button onclick="window.triggerPunchOut()" class="bg-gradient-to-r from-rose-500 to-red-600 text-xs text-white font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-rose-500/20 transition-all flex items-center space-x-1.5">
                            <i class="fa-solid fa-right-from-bracket"></i>
                            <span>Punch Out</span>
                        </button>
                    `;
                } else if(data.punchOut) {
                    isPunchedInToday = true; 
                    container.innerHTML = `
                        <div class="bg-neutral-900/80 border border-neutral-800/60 text-[11px] text-neutral-500 font-medium px-3 py-1.5 rounded-xl cursor-not-allowed">
                            Shift Ended (${data.punchOut})
                        </div>
                    `;
                }
            }
        });

        window.triggerPunchIn = async function() {
            try {
                const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                
                await setDoc(attDocRef, {
                    mobile: riderMobileId,
                    rider: riderDisplayName,
                    date: todayStr,
                    punchIn: timeStr,
                    punchOut: null
                }, { merge: true });

                const walletProfileRef = doc(db, "riders", riderMobileId);
                await updateDoc(walletProfileRef, {
                    walletBalance: increment(250)
                });

                alert("Punch In Successful! ₹250 Daily Allowance Added to Wallet.");
            } catch (err) {
                console.error("Shift Write Fault:", err);
                alert("Error during punch in registry.");
            }
        };

        window.triggerPunchOut = async function() {
            if(confirm("Confirm action: Do you want to close your daily operation shift profile now?")) {
                try {
                    const timeStr = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    await updateDoc(attDocRef, {
                        punchOut: timeStr
                    });
                } catch (err) {
                    console.error("Shift Termination Fault:", err);
                }
            }
        };

        // Live Order Pipeline Engine Stream Wrapper
        function triggerPipelineStream() {
            onSnapshot(ordersRef, (snapshot) => {
                const streamStack = document.getElementById('pipeline-stream-stack');
                if(!streamStack) return;
                streamStack.innerHTML = '';

                let allocatedJobsCount = 0;
                let combinedEarningsCalculated = 0;
                let sumTotalJarsDelivered = 0;

                snapshot.forEach((orderDoc) => {
                    const data = orderDoc.data();
                    const docId = orderDoc.id;

                    let matchFound = false;
                    if (data.riderMobile && String(data.riderMobile).trim() === riderMobileId) {
                        matchFound = true;
                    } else if (data.assignedRider && String(data.assignedRider).trim() === riderMobileId) {
                        matchFound = true;
                    } else if (data.rider && String(data.rider).startsWith(riderMobileId)) {
                        matchFound = true; 
                    }

                    if (!matchFound) return; 

                    allocatedJobsCount++;
                    const productVolume = parseInt(data.quantity) || 0;

                    // Fetch dynamic price & commission rate configuration from map
                    const custKey = data.customerName ? data.customerName.trim().toLowerCase() : '';
                    const custConfig = globalCustomersMap.get(custKey) || { jarPrice: DEFAULT_JAR_PRICE, commRate: DEFAULT_COMM_RATE };
                    
                    const dynamicJarPrice = custConfig.jarPrice;
                    const dynamicCommRate = custConfig.commRate;
                    const calculatedTotalBill = productVolume * dynamicJarPrice;
                    const currentOrderCommission = productVolume * dynamicCommRate;

                    if (data.status === 'progressing well') {
                        sumTotalJarsDelivered += productVolume;
                        combinedEarningsCalculated += currentOrderCommission;
                    }

                    let visualNodeIcon = '';
                    let pipelineActionBlock = '';

                    if(data.status === 'Pending') {
                        visualNodeIcon = `<div class="h-12 w-12 rounded-full bg-amber-500/10 border border-amber-500/30 flex items-center justify-center text-amber-400 z-10 relative"><i class="fa-solid fa-clock text-base"></i></div>`;
                        pipelineActionBlock = `
                            <button onclick="window.handleStartDelivery('${docId}', '${data.customerName || 'Customer'}', '${data.mobileNumber || ''}', '${data.orderId || 'N/A'}', '${productVolume}')" class="w-full bg-neutral-900 border border-neutral-800 text-xs text-neutral-300 font-semibold py-3 rounded-xl hover:bg-neutral-800 transition-colors flex items-center justify-center space-x-2">
                                <i class="fa-solid fa-truck-fast text-cyan-400"></i>
                                <span>Accept & Start Delivery</span>
                            </button>
                        `;
                    } else if(data.status === 'Out for Delivery') {
                        visualNodeIcon = `<div class="h-12 w-12 rounded-full bg-cyan-500/10 border border-cyan-500/30 flex items-center justify-center text-cyan-400 z-10 relative animate-pulse"><i class="fa-solid fa-truck-fast text-base"></i></div>`;
                        pipelineActionBlock = `
                            <button onclick="window.updateOrderStatusNode('${docId}', 'progressing well', ${currentOrderCommission})" class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 text-xs font-bold text-white py-3 rounded-xl shadow-lg shadow-emerald-500/10 transition-transform flex items-center justify-center space-x-2">
                                <i class="fa-solid fa-circle-check"></i>
                                <span>Mark as Order Delivered</span>
                            </button>
                        `;
                    } else if(data.status === 'progressing well') {
                        visualNodeIcon = `<div class="h-12 w-12 rounded-full bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400 z-10 relative"><i class="fa-solid fa-circle-check text-base"></i></div>`;
                        pipelineActionBlock = `
                            <div class="bg-emerald-500/5 border border-emerald-500/10 rounded-xl p-3 text-center text-xs font-medium text-emerald-400/80 flex items-center justify-center space-x-1.5">
                                <i class="fa-solid fa-square-check"></i>
                                <span>Settled into Wallet Balance (+₹${currentOrderCommission.toFixed(2)})</span>
                            </div>
                        `;
                    }

                    const itemTemplate = `
                        <div class="flex items-start space-x-4">
                            ${visualNodeIcon}
                            <div class="flex-1 apple-blur rounded-2xl p-4 space-y-4 shadow-xl">
                                <div class="flex justify-between items-start">
                                    <div>
                                        <span class="text-[10px] font-mono font-bold tracking-wider text-blue-400 uppercase bg-blue-500/5 border border-blue-500/10 px-2 py-0.5 rounded-md">ID: ${data.orderId || 'N/A'}</span>
                                        <h4 class="text-base font-bold text-white tracking-tight mt-2">${data.customerName || 'Customer'}</h4>
                                    </div>
                                    <div class="text-right">
                                        <span class="text-xs font-bold text-neutral-200 block font-mono">${productVolume} x 20L Jars</span>
                                        <span class="text-[11px] text-emerald-400 font-bold block font-mono mt-1">Total Bill: ₹${calculatedTotalBill}</span>
                                        <span class="text-[9px] text-neutral-500 block font-mono">Rate: ₹${dynamicJarPrice}/Jar</span>
                                    </div>
                                </div>
                                
                                <div class="space-y-2 text-xs text-neutral-400 border-t border-neutral-900 pt-3">
                                    <div class="flex items-center justify-between bg-neutral-900/40 p-2 rounded-xl border border-neutral-800/40">
                                        <div class="flex items-center space-x-2">
                                            <i class="fa-solid fa-phone text-neutral-500 text-[10px] w-3"></i>
                                            <span class="font-mono text-neutral-200">${data.mobileNumber || 'No Phone'}</span>
                                        </div>
                                        ${data.mobileNumber ? `
                                            <a href="tel:${data.mobileNumber}" class="bg-blue-600/20 hover:bg-blue-600 text-blue-400 hover:text-white px-2.5 py-1 rounded-lg text-[11px] font-medium transition-all flex items-center space-x-1">
                                                <i class="fa-solid fa-phone text-[10px]"></i>
                                                <span>Call Customer</span>
                                            </a>
                                        ` : ''}
                                    </div>
                                    <div class="flex items-start space-x-2 px-1 pt-1"><i class="fa-solid fa-location-dot text-neutral-600 text-[10px] w-3 mt-0.5"></i><span class="flex-1 leading-relaxed">${data.address || 'No destination address listed'}</span></div>
                                </div>

                                <div class="pt-1">
                                    ${pipelineActionBlock}
                                </div>
                            </div>
                        </div>
                    `;
                    streamStack.innerHTML += itemTemplate;
                });

                if(allocatedJobsCount === 0) {
                    streamStack.innerHTML = `<div class="apple-blur rounded-2xl p-8 text-center text-neutral-500 text-sm">No dispatches allocated for you today.</div>`;
                }

                updateMetricsUI(combinedEarningsCalculated, sumTotalJarsDelivered);
            });
        }

        // Combined handler for changing DB node status and triggering WhatsApp text
        window.handleStartDelivery = async function(docId, customerName, customerMobile, orderId, quantity) {
            try {
                await updateDoc(doc(db, "aquapure_orders", docId), {
                    status: 'Out for Delivery'
                });

                if(customerMobile) {
                    let formattedPhone = customerMobile.replace(/\D/g, '');
                    if(formattedPhone.length === 10) {
                        formattedPhone = "91" + formattedPhone; 
                    }

                    const templateMessage = `💧 *AquaPure Delivery Update* 💧%0A%0AHello *${customerName}*, your water supply order *#${orderId}* is out for delivery!%0A%0A🚚 *Rider Name:* ${riderDisplayName}%0A📱 *Rider Mobile:* ${riderMobileId}%0A📦 *Quantity:* ${quantity} x 20L Jars%0A%0AOur rider is on the way and will reach your address shortly. Thank you for choosing AquaPure!`;
                    
                    const waUrl = `https://api.whatsapp.com/send?phone=${formattedPhone}&text=${templateMessage}`;
                    window.open(waUrl, '_blank');
                }
            } catch(err) {
                console.error("Mutation and WhatsApp trigger failed:", err);
                alert("Error updates allocation nodes.");
            }
        }

        window.updateOrderStatusNode = async function(docId, nextStatusState, commissionAmount) {
            try {
                const orderDocRef = doc(db, "aquapure_orders", docId);
                
                await updateDoc(orderDocRef, {
                    status: nextStatusState
                });

                if (nextStatusState === "progressing well") {
                    const walletProfileRef = doc(db, "riders", riderMobileId);
                    await updateDoc(walletProfileRef, {
                        walletBalance: increment(commissionAmount)
                    });
                }
            } catch (err) {
                console.error("Critical Mutation State Error Exception:", err);
                alert("Error writing pipeline updates to cloud node.");
            }
        };

        function updateMetricsUI(earnings, totalJars) {
            let totalDisplayEarnings = earnings;
            if (isPunchedInToday) {
                totalDisplayEarnings += 250; 
            }
            document.getElementById('rider-earnings').innerText = `₹${Number(totalDisplayEarnings).toFixed(2)}`;
            document.getElementById('rider-jars').innerText = totalJars;
        }

        window.processLogout = function() {
            if(confirm("Are you sure you want to log out of this node endpoint?")) {
                localStorage.clear();
                window.location.href = "index.html";
            }
        };
    </script>
</body>
</html>
