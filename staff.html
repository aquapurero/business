<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaPure Terminal | Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; background-color: #000000; color: #f5f5f7; }
        .apple-blur { background: rgba(22, 22, 23, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .status-pipeline::before { content: ''; position: absolute; left: 23px; top: 24px; bottom: 24px; width: 2px; background: #27272a; z-index: 0; }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="sticky top-0 z-50 apple-blur border-b border-neutral-900 px-4 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="h-9 w-9 rounded-xl bg-gradient-to-tr from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg shadow-blue-500/20">
                <i class="fa-solid fa-droplet text-white text-lg"></i>
            </div>
            <div>
                <span class="text-lg font-semibold tracking-tight text-white block">AquaPure Live</span>
                <span class="text-[10px] text-neutral-400 font-mono uppercase tracking-widest block" id="rider-mobile-identity">Connecting...</span>
            </div>
        </div>
        <div class="flex items-center space-x-3">
            <div id="dutyStatusContainer"></div>
            <button onclick="window.processLogout()" class="h-9 w-9 rounded-xl bg-neutral-900 border border-neutral-800 flex items-center justify-center text-neutral-400 hover:text-rose-400 transition-colors">
                <i class="fa-solid fa-power-off text-sm"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-md mx-auto p-4 space-y-6">
        <div class="grid grid-cols-2 gap-4">
            <div class="apple-blur rounded-2xl p-4 flex items-center justify-between">
                <div>
                    <span class="text-[11px] text-neutral-400 font-medium uppercase tracking-wider block">Today's Earnings</span>
                    <span class="text-xl font-bold text-white mt-1 block font-mono" id="rider-earnings">₹0.00</span>
                </div>
                <div class="h-9 w-9 rounded-xl bg-emerald-500/10 border border-emerald-500/20 flex items-center justify-center text-emerald-400">
                    <i class="fa-solid fa-wallet text-sm"></i>
                </div>
            </div>
            <div class="apple-blur rounded-2xl p-4 flex items-center justify-between">
                <div>
                    <span class="text-[11px] text-neutral-400 font-medium uppercase tracking-wider block">Jars Delivered</span>
                    <span class="text-xl font-bold text-white mt-1 block font-mono" id="rider-jars">0</span>
                </div>
                <div class="h-9 w-9 rounded-xl bg-blue-500/10 border border-blue-500/20 flex items-center justify-center text-blue-400">
                    <i class="fa-solid fa-box text-sm"></i>
                </div>
            </div>
        </div>

        <div class="relative status-pipeline space-y-6" id="pipeline-stream-stack">
            <div class="apple-blur rounded-2xl p-6 text-center text-neutral-500 text-sm">Synchronizing...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqCuaCTnFwPCbkczZo4-Ysjjpq9qLX1iY",
            authDomain: "aquapure-1a3ce.firebaseapp.com",
            projectId: "aquapure-1a3ce",
            storageBucket: "aquapure-1a3ce.firebasestorage.app",
            messagingSenderId: "8661923251",
            appId: "1:8661923251:web:0cc44e9058a0d4859987c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const riderMobileId = localStorage.getItem('active_user');
        const riderDisplayName = localStorage.getItem('active_user_name') || 'Rider';

        if (!riderMobileId) window.location.href = "index.html";

        document.getElementById('rider-mobile-identity').innerText = `Node: ${riderMobileId} (${riderDisplayName})`;

        const ordersRef = collection(db, "aquapure_orders");
        const customersRef = collection(db, "customers");
        const attDocRef = doc(db, "rider_attendance", `${riderMobileId}_${new Date().toISOString().split('T')[0]}`);
        
        let globalCustomersMap = new Map();
        let isPunchedInToday = false;

        onSnapshot(customersRef, (s) => {
            globalCustomersMap.clear();
            s.forEach(d => globalCustomersMap.set(d.data().name.trim().toLowerCase(), d.data()));
            triggerPipelineStream();
        });

        onSnapshot(attDocRef, (docSnap) => {
            const container = document.getElementById('dutyStatusContainer');
            if(!docSnap.exists()) {
                container.innerHTML = `<button onclick="window.triggerPunchIn()" class="bg-gradient-to-r from-emerald-500 to-teal-600 text-xs text-white font-semibold px-4 py-2.5 rounded-xl shadow-lg shadow-emerald-500/20">Punch In</button>`;
            } else {
                const data = docSnap.data();
                isPunchedInToday = !!data.punchIn;
                container.innerHTML = data.punchOut ? `<div class="text-[11px] text-neutral-500">Shift Ended</div>` : `<button onclick="window.triggerPunchOut()" class="bg-rose-600 text-xs text-white px-4 py-2.5 rounded-xl">Punch Out</button>`;
            }
        });

        window.triggerPunchIn = async () => {
            await setDoc(attDocRef, { mobile: riderMobileId, punchIn: new Date().toLocaleTimeString() }, { merge: true });
            await updateDoc(doc(db, "riders", riderMobileId), { walletBalance: increment(250) });
        };

        window.triggerPunchOut = async () => {
            if(confirm("Close shift?")) await updateDoc(attDocRef, { punchOut: new Date().toLocaleTimeString() });
        };

        function triggerPipelineStream() {
            onSnapshot(ordersRef, (snapshot) => {
                const streamStack = document.getElementById('pipeline-stream-stack');
                streamStack.innerHTML = '';
                let totalEarnings = 0, totalJars = 0;

                snapshot.forEach((orderDoc) => {
                    const data = orderDoc.data();
                    if (data.riderMobile !== riderMobileId && data.assignedRider !== riderMobileId) return;

                    const pQty = parseInt(data.quantity) || 0;
                    if (data.status === 'progressing well') {
                        totalJars += pQty;
                        totalEarnings += (pQty * (data.commission || 3));
                    }

                    let actionBlock = '';
                    if(data.status === 'Pending') {
                        actionBlock = `<button onclick="window.handleStartDelivery('${orderDoc.id}')" class="w-full bg-blue-600 text-white py-3 rounded-xl text-xs">Accept & Start</button>`;
                    } else if(data.status === 'Out for Delivery') {
                        actionBlock = `
                            <div class="mb-3">
                                <label class="text-[10px] text-neutral-400 uppercase font-bold">Empty Jars Collected</label>
                                <input type="number" id="collect-${orderDoc.id}" value="${pQty}" class="w-full bg-neutral-900 border border-neutral-700 p-2 rounded-lg text-white">
                            </div>
                            <button onclick="window.submitFinalDelivery('${orderDoc.id}', ${data.commission || 3})" class="w-full bg-emerald-600 text-white py-3 rounded-xl text-xs">Complete Delivery</button>
                        `;
                    }

                    streamStack.innerHTML += `
                        <div class="apple-blur rounded-2xl p-4">
                            <h4 class="font-bold text-white">${data.customerName}</h4>
                            <p class="text-xs text-neutral-400">${data.address}</p>
                            <div class="mt-4">${actionBlock}</div>
                        </div>
                    `;
                });
                if(isPunchedInToday) totalEarnings += 250;
                document.getElementById('rider-earnings').innerText = `₹${totalEarnings.toFixed(2)}`;
                document.getElementById('rider-jars').innerText = totalJars;
            });
        }

        window.handleStartDelivery = async (id) => await updateDoc(doc(db, "aquapure_orders", id), { status: 'Out for Delivery' });

        window.submitFinalDelivery = async (id, comm) => {
            const collected = document.getElementById(`collect-${id}`).value;
            if(confirm("Confirm delivery?")) {
                await updateDoc(doc(db, "aquapure_orders", id), { 
                    status: 'progressing well', 
                    emptyJarsCollected: parseInt(collected) 
                });
                await updateDoc(doc(db, "riders", riderMobileId), { walletBalance: increment(parseInt(collected) * comm) });
            }
        };

        window.processLogout = () => { localStorage.clear(); window.location.href = "index.html"; };
    </script>
</body>
</html>
