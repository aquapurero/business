<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaPure Staff Hub</title>
    <!-- Google Fonts & Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- FontAwesome Premium Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #0b0c10;
            color: #f5f5f7;
        }
        .apple-card {
            background: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .ios-action-btn {
            background: #0071e3;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .ios-action-btn:active {
            transform: scale(0.96);
            background: #005bb5;
        }
    </style>
</head>
<body class="min-h-screen pb-12 select-none">

    <!-- Premium Minimal Header -->
    <header class="sticky top-0 z-50 bg-[#0b0c10]/80 backdrop-blur-md border-b border-neutral-900 px-5 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-2.5">
            <div class="h-8 w-8 rounded-lg bg-blue-500 flex items-center justify-center text-white shadow-md shadow-blue-500/10">
                <i class="fa-solid fa-droplet text-sm"></i>
            </div>
            <h1 class="text-lg font-semibold tracking-tight text-white">AquaPure <span class="text-xs text-neutral-400 font-normal">Rider Port</span></h1>
        </div>
        <div class="flex items-center space-x-2">
            <span class="h-2 w-2 rounded-full bg-emerald-500 animate-ping"></span>
            <span class="text-xs font-medium text-emerald-400 tracking-wide bg-emerald-500/10 px-2 py-0.5 rounded-full border border-emerald-500/20">Online</span>
        </div>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-5">
        
        <!-- Welcome Profiles Card -->
        <div class="apple-card p-4 rounded-2xl flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="h-12 w-12 rounded-full bg-neutral-800 border border-neutral-700 flex items-center justify-center text-blue-400 text-lg font-semibold">
                    RS
                </div>
                <div>
                    <h2 class="text-base font-semibold text-white">Rahul Sharma</h2>
                    <p class="text-xs text-neutral-400">Rider ID: #FF992</p>
                </div>
            </div>
            <div class="text-right">
                <span class="text-xs text-neutral-400 uppercase tracking-wider block">Today's Load</span>
                <span class="text-xl font-bold text-white" id="pending-count">01 Task</span>
            </div>
        </div>

        <!-- Task Allocation Header -->
        <div class="flex items-center justify-between px-1">
            <h3 class="text-xs font-semibold uppercase tracking-wider text-neutral-400">Current Task Pipeline</h3>
            <span class="text-xs text-blue-400 font-medium">Real-time Updates</span>
        </div>

        <!-- Interactive Delivery Cards Stack -->
        <div class="space-y-4" id="task-container">
            
            <!-- Active Card Instance -->
            <div class="apple-card rounded-2xl p-5 space-y-4 relative overflow-hidden" id="task-card-1">
                <div class="absolute top-0 left-0 w-1.5 h-full bg-blue-500"></div>
                
                <div class="flex justify-between items-start">
                    <div>
                        <span class="text-[11px] font-semibold tracking-wider uppercase text-blue-400 bg-blue-400/10 px-2 py-0.5 rounded border border-blue-500/20">Active Route</span>
                        <h4 class="text-lg font-bold text-white mt-2">Ramesh Kumar</h4>
                    </div>
                    <div class="text-right">
                        <p class="text-sm font-bold text-neutral-200">5 Jars</p>
                        <p class="text-[11px] text-neutral-400">Volume: 20 Liters</p>
                    </div>
                </div>

                <div class="space-y-2.5 pt-1">
                    <div class="flex items-start space-x-2.5 text-sm">
                        <i class="fa-solid fa-location-dot text-neutral-500 mt-0.5 w-4 text-center"></i>
                        <span class="text-neutral-300">Ward 5, Main Street, Near City Water Tank Complex</span>
                    </div>
                    <div class="flex items-center space-x-2.5 text-sm">
                        <i class="fa-solid fa-phone text-neutral-500 w-4 text-center"></i>
                        <a href="tel:+919876543210" class="text-blue-400 font-medium hover:underline">+91 98765 43210</a>
                    </div>
                </div>

                <div class="border-t border-neutral-800/60 pt-4 flex gap-3">
                    <button onclick="openNavigation()" class="w-1/3 bg-neutral-800 text-neutral-200 font-medium text-sm py-3 rounded-xl flex items-center justify-center space-x-1.5 border border-neutral-700/60 active:bg-neutral-700">
                        <i class="fa-solid fa-map-location-dot"></i>
                        <span>Maps</span>
                    </button>
                    <button onclick="updateDeliveryStatus('task-card-1')" id="action-btn-task-card-1" class="w-2/3 ios-action-btn text-white font-medium text-sm py-3 rounded-xl flex items-center justify-center space-x-2 shadow-lg shadow-blue-500/10">
                        <i class="fa-solid fa-circle-check"></i>
                        <span>Mark Delivered</span>
                    </button>
                </div>
            </div>

        </div>

    </main>

    <!-- Navigation Tab Alternative (iOS style Bottom Bar) -->
    <div class="fixed bottom-0 inset-x-0 bg-[#0b0c10]/80 backdrop-blur-lg border-t border-neutral-900 py-2.5 flex justify-around items-center max-w-md mx-auto">
        <button class="flex flex-col items-center space-y-0.5 text-blue-500">
            <i class="fa-solid fa-route text-lg"></i>
            <span class="text-[10px] font-medium">Deliveries</span>
        </button>
        <button class="flex flex-col items-center space-y-0.5 text-neutral-500 hover:text-neutral-300">
            <i class="fa-solid fa-clock-rotate-left text-lg"></i>
            <span class="text-[10px] font-medium">Logs</span>
        </button>
    </div>

    <script>
        function openNavigation() {
            // Generates native intent maps redirection structure
            window.open("https://maps.google.com", "_blank");
        }

        function updateDeliveryStatus(cardId) {
            const card = document.getElementById(cardId);
            const actionBtn = document.getElementById(`action-btn-${cardId}`);
            
            // Updates configuration state smoothly 
            actionBtn.innerHTML = `<i class="fa-solid fa-spinner animate-spin"></i> <span>Updating Sync...</span>`;
            actionBtn.style.background = "#10b981";
            
            setTimeout(() => {
                // Update to the preferred operational status wording
                card.style.transition = "all 0.4s ease";
                card.style.opacity = "0.6";
                actionBtn.className = "w-full bg-emerald-500/10 text-emerald-400 text-sm py-2.5 rounded-xl border border-emerald-500/20 font-medium pointer-events-none flex items-center justify-center space-x-2";
                actionBtn.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>progressing well</span>`;
                
                document.getElementById('pending-count').innerText = "00 Tasks";
                alert("Status synchronized: Progression registered on Master Control.");
            }, 1200);
        }
    </script>
</body>
</html>
