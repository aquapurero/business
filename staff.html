<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AquaPure Staff - Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'SF Pro Display', sans-serif; background-color: #0b0c10; color: #f5f5f7; }
        .apple-card { background: rgba(28, 28, 30, 0.75); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.06); }
        .ios-btn { background: #0071e3; transition: all 0.2s ease; }
        .ios-btn:active { transform: scale(0.97); }
    </style>
</head>
<body class="min-h-screen pb-20 select-none">

    <!-- Header Config -->
    <header class="sticky top-0 z-50 bg-[#0b0c10]/80 backdrop-blur-md border-b border-neutral-900 px-5 py-4 flex justify-between items-center">
        <span class="font-bold text-white"><i class="fa-solid fa-droplet text-blue-500 mr-2"></i>Rider Port</span>
        <button onclick="logout()" class="text-xs text-neutral-400 hover:text-red-400">Logout</button>
    </header>

    <main class="max-w-md mx-auto p-4 space-y-5">
        
        <!-- Feature 2: Attendance Punch Terminal Box -->
        <div class="apple-card p-4 rounded-2xl flex flex-col justify-between gap-4">
            <div>
                <h2 class="text-sm font-bold text-white" id="profile-name">Rider Dashboard</h2>
                <p class="text-xs text-neutral-400">Mark daily attendance profile check-in</p>
            </div>
            <button id="punch-btn" onclick="punchAttendance()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-xs text-white font-medium py-3 rounded-xl transition-all shadow-md">
                <i class="fa-solid fa-fingerprint mr-1.5"></i> Clock-In Daily Shift
            </button>
        </div>

        <!-- Feature 3: Document Vault Link Handler -->
        <div class="apple-card p-4 rounded-2xl space-y-3">
            <h3 class="text-xs font-bold uppercase tracking-wider text-neutral-400">KYC Verification Files</h3>
            <input type="text" id="doc-title" placeholder="Document Name (e.g. Driving License)" class="w-full text-xs bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2 text-white outline-none">
            <input type="text" id="doc-url" placeholder="Paste verification URL or Google Drive Link" class="w-full text-xs bg-neutral-900 border border-neutral-800 rounded-lg px-3 py-2 text-white outline-none">
            <button onclick="submitDocLink()" class="w-full bg-neutral-800 hover:bg-neutral-700 text-xs text-white py-2 rounded-xl border border-neutral-700">Link Secure Document</button>
        </div>

        <!-- Task Allocation Header -->
        <div class="flex items-center justify-between px-1">
            <h3 class="text-xs font-semibold uppercase tracking-wider text-neutral-400">Allocated Deliveries Pool</h3>
        </div>

        <!-- Deliveries Stream Stack (Features 4, 5, 6) -->
        <div class="space-y-4" id="staff-task-container">
            <!-- Dynamic Injection Modules -->
        </div>

    </main>

    <!-- Script Application Sync Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, addDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAqCuaCTnFwPCbkczZo4-Ysjjpq9qLX1iY",
            authDomain: "aquapure-1a3ce.firebaseapp.com",
            projectId: "aquapure-1a3ce",
            storageBucket: "aquapure-1a3ce.firebasestorage.app",
            messagingSenderId: "8661923251",
            appId: "1:8661923251:web:0cc44e9058a0d4859987c6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Security session checkpoint verification
        const activeUser = localStorage.getItem('active_user') || 'anonymous_rider';
        document.getElementById('profile-name').innerText = "Rider: " + activeUser.toUpperCase();

        // Target active dynamic matching tasks
        const q = query(collection(db, "aquapure_orders"), where("rider", "==", activeUser));

        onSnapshot(q, (snap) => {
            const container = document.getElementById('staff-task-container');
            container.innerHTML = '';

            if(snap.empty) {
                container.innerHTML = `<p class="text-center text-neutral-500 py-6 text-xs">No active orders allocated to your route parameters.</p>`;
                return;
            }

            snap.forEach(docSnap => {
                const data = docSnap.data();
                const dId = docSnap.id;

                let actionLayout = '';
                if(data.status !== 'progressing well') {
                    actionLayout = `
                        <div class="border-t border-neutral-800/60 pt-3 flex gap-2">
                            <button onclick="window.open('https://maps.google.com', '_blank')" class="bg-neutral-800 text-xs px-3 py-2 rounded-lg border border-neutral-700 text-neutral-200">Maps</button>
                            <button onclick="markDelivered('${dId}')" class="w-full ios-btn text-xs text-white py-2 rounded-lg font-medium">Mark Delivered</button>
                        </div>
                    `;
                } else {
                    actionLayout = `
                        <div class="w-full bg-emerald-500/10 text-emerald-400 text-xs py-2 rounded-lg border border-emerald-500/20 text-center font-medium">
                            <i class="fa-solid fa-check-double mr-1"></i> progressing well
                        </div>
                    `;
                }

                container.innerHTML += `
                    <div class="apple-card rounded-2xl p-4 space-y-3 relative overflow-hidden">
                        <div class="flex justify-between items-start">
                            <div>
                                <h4 class="text-base font-bold text-white">${data.customerName}</h4>
                                <p class="text-xs text-neutral-400 mt-1"><i class="fa-solid fa-location-dot mr-1 text-neutral-500"></i>${data.address}</p>
                            </div>
                            <div class="text-right">
                                <span class="text-xs font-bold text-blue-400 block">${data.quantity} Jars</span>
                                <span class="text-[10px] text-neutral-500 bg-neutral-900 px-2 py-0.5 rounded mt-1 inline-block">₹${data.price}</span>
                            </div>
                        </div>
                        <p class="text-xs">Payment State: <span class="font-bold ${data.payment === 'Done' ? 'text-emerald-400' : 'text-amber-400'}">${data.payment}</span></p>
                        ${actionLayout}
                    </div>
                `;
            });
        });

        window.punchAttendance = async function() {
            await addDoc(collection(db, "aquapure_attendance"), {
                username: activeUser,
                timestamp: new Date().toLocaleString()
            });
            alert("Shift attendance checked in successfully with live logs!");
            document.getElementById('punch-btn').disabled = true;
            document.getElementById('punch-btn').className = "w-full bg-neutral-800 text-neutral-500 text-xs py-3 rounded-xl pointer-events-none text-center";
            document.getElementById('punch-btn').innerText = "Shift Live Checked-In";
        };

        window.submitDocLink = async function() {
            const title = document.getElementById('doc-title').value;
            const url = document.getElementById('doc-url').value;
            if(!title || !url) return alert("Please fill details correctly.");
            
            await addDoc(collection(db, "aquapure_expenses"), {
                description: `Document Link Audit - [${activeUser.toUpperCase()}] ${title}: ${url}`,
                amount: 0
            });
            alert("KYC reference parameters mapped into system logs data nodes.");
            document.getElementById('doc-title').value = '';
            document.getElementById('doc-url').value = '';
        };

        window.markDelivered = async function(id) {
            await updateDoc(doc(db, "aquapure_orders", id), {
                status: "progressing well"
            });
        };

        window.logout = function() { localStorage.clear(); window.location.href = 'index.html'; }
    </script>
</body>
</html>
